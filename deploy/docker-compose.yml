# Local dev stack for Havoc. Brings up everything that lives outside
# Kubernetes: Kafka + Zookeeper, Postgres, Redis, and the ELK trio for
# log inspection. The kind cluster is created separately (`make kind`)
# and is joined onto the same `havoc` docker network so pods inside
# kind can reach `kafka:9092`, `postgres:5432`, etc. by service name.
#
# Ports are also bound to localhost so host-side tools (psql, kcat,
# redis-cli, the havoc CLI) can talk to the same services without
# leaving the laptop.

name: havoc

networks:
  havoc:
    name: havoc
    driver: bridge

volumes:
  postgres-data:
  kafka-data:
  zookeeper-data:
  zookeeper-log:
  es-data:

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    networks: [havoc]
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      # cp-zookeeper only whitelists `srvr` by default; `ruok`/`mntr`
      # need to be opted in. Enable them so the healthcheck can use a
      # cheap echo without shelling into Java.
      KAFKA_OPTS: "-Dzookeeper.4lw.commands.whitelist=srvr,ruok,mntr"
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-log:/var/lib/zookeeper/log
    healthcheck:
      # cp-zookeeper ships zookeeper-shell; using it avoids depending
      # on a particular netcat being present in the image.
      test: ["CMD-SHELL", "zookeeper-shell localhost:2181 ls / >/dev/null 2>&1"]
      interval: 5s
      timeout: 10s
      retries: 30
      start_period: 20s

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      zookeeper:
        condition: service_healthy
    networks: [havoc]
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # Two listeners: one for in-network traffic (kafka:29092 inside
      # docker / kind) and one for host traffic (localhost:9092 from
      # the laptop). kafka-go and the CLI need both.
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,HOST://localhost:9092
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,HOST://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 20

  postgres:
    image: postgres:16-alpine
    networks: [havoc]
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: havoc
      POSTGRES_PASSWORD: havoc
      POSTGRES_DB: havoc
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "havoc"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    networks: [havoc]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    networks: [havoc]
    ports:
      - "9200:9200"
    environment:
      discovery.type: single-node
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
      xpack.security.enabled: "false"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health >/dev/null"]
      interval: 10s
      timeout: 10s
      retries: 30

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.4
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks: [havoc]
    ports:
      - "5601:5601"
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200

# Filebeat used to live here but tailing host docker logs can't reach
# the Havoc binaries — they run as nested containers inside kind nodes,
# so their stdout never lands in /var/lib/docker/containers on the
# host. Filebeat now ships from inside the kind cluster as a DaemonSet
# (deploy/k8s/filebeat.yaml), which tails kubelet container logs and
# forwards them to this Elasticsearch over the shared `havoc` network.
